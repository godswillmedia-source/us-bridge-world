version: '3.8'
services:
  server:
    image: agent-office/server:latest
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=sqlite:/data/office.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/data
  
  client:
    image: agent-office/ui:latest
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    ports:
      - "80:80"
    environment:
      - API_URL=http://server:3000
  
  redis:
    image: redis:alpine
  
  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama:
